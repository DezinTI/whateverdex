<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DzDex | WhateverDex</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>DzDex</h1>
            <p>Lista simples de coisas que aleatorias com imagem e video do YouTube.</p>
            <p>Se a API nao estiver ativa, a pagina entra em modo estatico automatico.</p>
        </header>

        <section class="toolbar">
            <input type="text" id="filtroInput" placeholder="Buscar por nome, tipo ou descrição...">
            <select id="tipoFiltro">
                <option value="">Todos os tipos</option>
            </select>
            <button id="atualizarBtn">Atualizar Lista</button>
        </section>

        <section>
            <h2>Registros</h2>
            <div id="cardsContainer" class="cards-grid"></div>
        </section>

        <section class="panel">
            <h2>Novo Registro</h2>
            <form id="novoMonstroForm" class="form-grid">
                <input id="nome" placeholder="Nome" required>
                <div class="categoria-inline">
                    <input id="novaCategoria" placeholder="Nova categoria (ex: meme-anime)">
                    <button type="button" id="criarCategoriaBtn">Cadastrar categoria</button>
                </div>
                <select id="tipo" required>
                    <option value="">Selecione o tipo</option>
                </select>
                <input id="videoYoutubeUrl" placeholder="Link do YouTube" required>
                <input id="imagemArquivo" type="file" accept="image/*">
                <input id="imagemUrl" placeholder="ou URL da imagem">
                <textarea id="descricao" placeholder="Descrição"></textarea>
                <button type="submit">Salvar Registro</button>
            </form>
        </section>
    </div>

    <div id="detalhesModal" class="modal">
        <div class="modal-content">
            <button id="fecharModal" class="close-btn">×</button>
            <div id="detalhesConteudo"></div>
        </div>
    </div>

    <script src="registros-static.js"></script>
    <script src="script.js"></script>
</body>

</html>
